<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 530" width="100%">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="530" fill="#F8F9FA" rx="0"/>

  <!-- Top header -->
  <rect x="0" y="0" width="800" height="56" fill="#1E1E2E" rx="0"/>
  <text x="20" y="36" font-size="18" font-weight="600" fill="#FFFFFF">oh-my-deepseek-harness</text>
  <text x="185" y="36" font-size="14" font-weight="400" fill="#A6ADC8">装了 vs 没装，同一个 Agent 的差距</text>

  <!-- VS divider -->
  <rect x="385" y="75" width="30" height="30" rx="15" fill="#E0E0E0"/>
  <text x="400" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#666">VS</text>

  <!-- ====== LEFT PANEL: BEFORE ====== -->
  <rect x="20" y="72" width="358" height="370" rx="10" fill="#FFFFFF" stroke="#F0C0C0" stroke-width="1.5"/>
  <rect x="20" y="72" width="358" height="44" rx="10" fill="#FFF0F0"/>
  <rect x="20" y="106" width="358" height="10" fill="#FFF0F0"/>
  <circle cx="44" cy="94" r="14" fill="#FF6B6B"/>
  <text x="44" y="98" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">!</text>
  <text x="68" y="99" font-size="15" font-weight="600" fill="#CC3333">BEFORE</text>
  <text x="68" y="116" font-size="11" fill="#CC3333">普通 Hermes + DeepSeek（无插件）</text>

  <!-- Left chat bubbles -->
  <!-- User message -->
  <rect x="36" y="132" width="150" height="32" rx="16" fill="#E8E8E8"/>
  <text x="50" y="152" font-size="12" fill="#333">帮我优化这个函数</text>

  <!-- Agent response (verbose) -->
  <rect x="36" y="172" width="326" height="100" rx="10" fill="#FFF5F5" stroke="#FFD0D0" stroke-width="0.5"/>
  <text x="52" y="192" font-size="11" fill="#CC3333" font-weight="600">Agent 开始深度推理...</text>
  <text x="52" y="210" font-size="11" fill="#666">让我仔细分析这个函数的复杂度...</text>
  <text x="52" y="226" font-size="11" fill="#666">从算法角度看...从数据结构看...</text>
  <text x="52" y="242" font-size="11" fill="#666">考虑到边界条件...占 Token 500+</text>
  <text x="52" y="262" font-size="11" fill="#CC3333">对简单任务也深度推理，Token 浪费</text>

  <!-- Highlight: problems -->
  <rect x="36" y="282" width="326" height="18" rx="4" fill="#FFF0F0"/>
  <text x="44" y="295" font-size="11" fill="#CC3333">❌ 无推理路由：简单重构也用高推理强度</text>

  <rect x="36" y="306" width="326" height="18" rx="4" fill="#FFF0F0"/>
  <text x="44" y="319" font-size="11" fill="#CC3333">❌ 上下文膨胀：不压缩，很快到 Token 上限</text>

  <rect x="36" y="330" width="326" height="18" rx="4" fill="#FFF0F0"/>
  <text x="44" y="343" font-size="11" fill="#CC3333">❌ 行为不可控：没有认知门控约束</text>

  <!-- Summary bad -->
  <rect x="36" y="358" width="326" height="36" rx="8" fill="#FF6B6B" opacity="0.12"/>
  <text x="199" y="375" text-anchor="middle" font-size="12" fill="#CC3333" font-weight="600">Token 消耗大 · 响应质量不可控 · 体验差</text>
  <text x="199" y="390" text-anchor="middle" font-size="11" fill="#CC3333">每次对话都在交学费，积累越多浪费越多</text>

  <!-- ====== RIGHT PANEL: AFTER ====== -->
  <rect x="422" y="72" width="358" height="370" rx="10" fill="#FFFFFF" stroke="#A0D8B0" stroke-width="1.5"/>
  <rect x="422" y="72" width="358" height="44" rx="10" fill="#F0FFF4"/>
  <rect x="422" y="106" width="358" height="10" fill="#F0FFF4"/>
  <circle cx="446" cy="94" r="14" fill="#2ECC71"/>
  <text x="446" y="98" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">✓</text>
  <text x="470" y="99" font-size="15" font-weight="600" fill="#1A8C3A">AFTER</text>
  <text x="470" y="116" font-size="11" fill="#1A8C3A">装了 oh-my-deepseek-harness</text>

  <!-- Right chat bubbles -->
  <!-- User message (same) -->
  <rect x="438" y="132" width="150" height="32" rx="16" fill="#E8E8E8"/>
  <text x="452" y="152" font-size="12" fill="#333">帮我优化这个函数</text>

  <!-- Agent response (optimized) -->
  <rect x="438" y="172" width="326" height="100" rx="10" fill="#F0FFF4" stroke="#A0D8B0" stroke-width="0.5"/>
  <text x="454" y="192" font-size="11" fill="#1A8C3A" font-weight="600">→ 意图路由识别：重构任务</text>
  <text x="454" y="210" font-size="11" fill="#1A8C3A" font-weight="600">→ 绑定中等推理强度</text>
  <text x="454" y="228" font-size="11" fill="#1A8C3A" font-weight="600">→ 触发认知门控：专注输出代码</text>
  <text x="454" y="250" font-size="11" fill="#333">建议改用列表推导式，更简洁高效</text>
  <text x="454" y="266" font-size="11" fill="#1A8C3A">仅占 Token 约 150，输出精准</text>

  <!-- Highlight: gains -->
  <rect x="438" y="282" width="326" height="18" rx="4" fill="#F0FFF4"/>
  <text x="446" y="295" font-size="11" fill="#1A8C3A">✅ 意图→推理路由：复杂度自动匹配</text>

  <rect x="438" y="306" width="326" height="18" rx="4" fill="#F0FFF4"/>
  <text x="446" y="319" font-size="11" fill="#1A8C3A">✅ 上下文压缩引擎：续对话不膨胀</text>

  <rect x="438" y="330" width="326" height="18" rx="4" fill="#F0FFF4"/>
  <text x="446" y="343" font-size="11" fill="#1A8C3A">✅ 认知门控 + 约束免疫系统</text>

  <!-- Summary good -->
  <rect x="438" y="358" width="326" height="36" rx="8" fill="#2ECC71" opacity="0.12"/>
  <text x="601" y="375" text-anchor="middle" font-size="12" fill="#1A8C3A" font-weight="600">Token 节省 60%+ · 行为可控 · 开箱即用</text>
  <text x="601" y="390" text-anchor="middle" font-size="11" fill="#1A8C3A">一条命令安装，零配置自动优化</text>

  <!-- ====== FULL WIDTH: VIRTUOUS CYCLE ====== -->
  <!-- Arrow from left bad to right good -->
  <path d="M142 400 L200 400" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="210" y="404" font-size="10" fill="#888">安装</text>
  <path d="M600 400 L658 400" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Insight callout -->
  <rect x="20" y="460" width="760" height="50" rx="10" fill="#2D3748"/>
  <path d="M 32 485 L 50 470 L 68 485" fill="none" stroke="#68D391" stroke-width="2" stroke-linecap="round"/>
  <text x="80" y="479" font-size="13" font-weight="600" fill="#FFFFFF">越用越好，这是插件的飞轮效应</text>
  <text x="80" y="496" font-size="12" fill="#A0AEC0">用得越多 → 它越懂你（Skill 学习 + 记忆累积） → 任务完成率越高 → Token 越少（缓存命中率提升） → 你还想继续用</text>

</svg>