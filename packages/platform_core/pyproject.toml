[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "platform-core"
version = "0.1.0"
description = "Platform-agnostic core logic extracted from deepseek-harness Hermes Plugin"
requires-python = ">=3.10"
dependencies = [
    "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = []

[tool.setuptools.packages.find]
include = ["platform_core*"]
