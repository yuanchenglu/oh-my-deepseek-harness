name: deepseek-harness
version: 2.2.0
description: 数字分身插件 v2.2。实现 13 个创新设计模式（I-01~I-13，I-14 已移除）+ I-17 推理提示路由 + I-18 时效注入 + 9 个注册工具（I-06/I-11/I-12）。
author: yuanchenglu

# 依赖声明：Context Engine Plugin（软依赖，不强制）
depends_on:
  context_engine: deepseek-context

# 暴露给 LLM 的工具列表（通过 ctx.register_tool 注册）
provides_tools:
  - plan_create
  - plan_update_step
  - plan_cascade
  - plan_status
  - memory_tag
  - memory_query
  - memory_filter
  - checkpoint_create
  - checkpoint_review

hooks:
  # I-02 + I-08 范围检测注入
  - pre_llm_call
  # I-10 策略指引 + I-08 排除清单
  - pre_llm_call
  # I-17 推理强度控制
  - pre_llm_call
  # I-18 时效信息注入
  - pre_llm_call
  # I-01 审计注入（可选）
  - pre_llm_call
  # 约束违反检测 + I-09 提议
  - post_tool_call
  # I-09 Skill 提议保存
  - on_session_end
  # 子任务追踪
  - subagent_start
  # 子任务追踪
  - subagent_stop
